<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Bucket List AI — Build Your List</title>
  <meta name="description" content="Answer 8 questions. We build your personalized bucket list in 3 minutes. Deeply personal, AI-powered, free."/>
  <link rel="canonical" href="https://thebucketlistai.com/app"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230B3D3D'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='%23C9A84C' font-family='Georgia'%3E✦%3C/text%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;background:#071E1E;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#F5EDD8}
    #root{min-height:100vh}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");background-size:256px;opacity:.5}
    @keyframes riseIn   {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn   {from{opacity:0}to{opacity:1}}
    @keyframes spin     {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes pulse    {0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}
    @keyframes goldGlow {0%,100%{box-shadow:0 2px 16px rgba(0,0,0,.3)}50%{box-shadow:0 0 40px 8px rgba(201,168,76,.28)}}
    @keyframes celebrate{0%{transform:scale(1)}40%{transform:scale(1.03)}70%{transform:scale(.98)}100%{transform:scale(1)}}
    @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
    @keyframes barGrow  {from{width:0}to{width:var(--w)}}
    @keyframes noteIn   {from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer  {0%,100%{opacity:.3}50%{opacity:.8}}

    input:focus,textarea:focus{outline:none!important;border-color:#C9A84C!important;box-shadow:0 0 0 3px rgba(201,168,76,.12)!important}
    select:focus{outline:none!important;border-color:#C9A84C!important}
    input::placeholder,textarea::placeholder{color:rgba(245,237,216,.3)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#071E1E}
    ::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}

    .btn-gold{transition:all .28s cubic-bezier(.22,1,.36,1)!important}
    .btn-gold:hover{background:#E2BC60!important;transform:translateY(-2px)!important;box-shadow:0 12px 40px rgba(201,168,76,.4)!important}
    .btn-ghost:hover{border-color:rgba(201,168,76,.5)!important;color:#C9A84C!important;background:rgba(201,168,76,.06)!important}
    .opt-btn:hover{border-color:#C9A84C!important;color:#C9A84C!important;background:rgba(201,168,76,.07)!important}
    .card-item{transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s ease}
    .card-item:hover{transform:translateY(-5px)!important;box-shadow:0 24px 60px rgba(0,0,0,.55)!important}
    .act-btn:hover{border-color:rgba(201,168,76,.5)!important;color:#C9A84C!important;background:rgba(201,168,76,.07)!important}
    .done-btn:hover{background:#C9A84C!important;color:#071E1E!important;border-color:#C9A84C!important}
    .mode-card:hover{border-color:#C9A84C!important;transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.45)!important}
    .pill-filter:hover{border-color:rgba(201,168,76,.5)!important;color:#F5EDD8!important}

    @media(max-width:600px){
      .hide-mobile{display:none!important}
      .controls-wrap{padding:10px 14px!important}
      .filter-scroll{overflow-x:auto!important;flex-wrap:nowrap!important;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .filter-scroll::-webkit-scrollbar{display:none}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── TOKENS ─────────────────────────────────────────────────────── */
const G="#C9A84C",GL="#E2BC60",GD="rgba(201,168,76,.38)";
const INK="#071E1E",TEAL="#0B3D3D",CARD="#0E3A3A",CARD2="#0D4040";
const IVY="#F5EDD8",MIST="rgba(245,237,216,.58)",RULE="rgba(201,168,76,.18)";
const SERIF="'Instrument Serif',Georgia,serif";
const BASK="'Libre Baskerville',Georgia,serif";
const SANS="'DM Sans',system-ui,sans-serif";

const CAT_COLOR={
  "Travel & Culture":"#4ECDC4","Adventure & Outdoors":"#7BC67E",
  "Food & Drink":"#E8956D","Creative & Arts":"#C084FC",
  "Learning & Skills":"#60A5FA","Wellness & Mindfulness":"#6EE7B7",
  "Personal Growth":"#F472B6","Relationships & Giving":"#FB923C",
  "Local Adventures":"#A3E635",
};
const CAT_KEYS=Object.keys(CAT_COLOR);
const DIFF_COLOR={"This Weekend":"#6EE7B7","This Year":"#60A5FA","Epic Goal":"#C084FC","Lifetime Dream":"#C9A84C"};

/* ── AFFILIATE ───────────────────────────────────────────────────── */
const VIATOR_PID="P00291748";      // TODO: replace with real Viator partner ID
const BOOKING_AID="000000";        // TODO: replace with real Booking.com AID
const AMAZON_TAG="bl05cb-20";      // Amazon Associates tracking ID

// Smart affiliate routing by category
function getAffiliateUrl(item){
  const q=encodeURIComponent(item.title);
  const loc=encodeURIComponent(item.location||item.title);
  const cat=item.category||"";

  // Learning & Skills → Amazon books search
  if(cat==="Learning & Skills")
    return `https://www.amazon.com/s?k=${q}+book&tag=${AMAZON_TAG}`;

  // Creative & Arts → Amazon supplies
  if(cat==="Creative & Arts")
    return `https://www.amazon.com/s?k=${q}+supplies&tag=${AMAZON_TAG}`;

  // Adventure & Outdoors → Viator experiences + Amazon gear fallback
  if(cat==="Adventure & Outdoors")
    return VIATOR_PID!=="P00291748"
      ? `https://www.viator.com/search/${loc}?pid=${VIATOR_PID}&mcid=42383&medium=api`
      : `https://www.amazon.com/s?k=${q}+gear&tag=${AMAZON_TAG}`;

  // Wellness & Mindfulness → Amazon wellness books/products
  if(cat==="Wellness & Mindfulness")
    return `https://www.amazon.com/s?k=${q}&tag=${AMAZON_TAG}`;

  // Personal Growth → Amazon books
  if(cat==="Personal Growth")
    return `https://www.amazon.com/s?k=${q}+book&tag=${AMAZON_TAG}`;

  // Food & Drink → Viator food tours
  if(cat==="Food & Drink")
    return VIATOR_PID!=="P00291748"
      ? `https://www.viator.com/search/${loc}+food+tour?pid=${VIATOR_PID}&mcid=42383&medium=api`
      : `https://www.amazon.com/s?k=${q}+cookbook&tag=${AMAZON_TAG}`;

  // Travel & Culture → Viator (best fit), fallback Booking.com
  if(cat==="Travel & Culture")
    return VIATOR_PID!=="P00291748"
      ? `https://www.viator.com/search/${loc}?pid=${VIATOR_PID}&mcid=42383&medium=api`
      : BOOKING_AID!=="000000"
        ? `https://www.booking.com/searchresults.html?ss=${loc}&aid=${BOOKING_AID}&label=bucketlistai`
        : `https://www.amazon.com/s?k=${q}+travel+guide&tag=${AMAZON_TAG}`;

  // Default → Amazon search
  return `https://www.amazon.com/s?k=${q}&tag=${AMAZON_TAG}`;
}

// Label for the button based on category
function getAffiliateCTA(item){
  const cat=item.category||"";
  if(cat==="Learning & Skills"||cat==="Personal Growth") return "📚 Find Books & Resources →";
  if(cat==="Creative & Arts") return "🎨 Shop Supplies →";
  if(cat==="Adventure & Outdoors") return "🧭 Book This Experience →";
  if(cat==="Wellness & Mindfulness") return "🌿 Explore Resources →";
  if(cat==="Food & Drink") return "🍽 Find Food Experiences →";
  if(cat==="Travel & Culture") return "✈ Book This Dream →";
  return "✦ Make It Happen →";
}

/* ── UNSPLASH ────────────────────────────────────────────────────── */
const UKEY="J05t6VFsg_Ff3Y7H9utFqxi9M7LNAjLM-Pm2H88vWhQ";
const FALLBACKS={
  "Travel & Culture":"https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=800&q=75",
  "Adventure & Outdoors":"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=75",
  "Food & Drink":"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=75",
  "Creative & Arts":"https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=800&q=75",
  "Learning & Skills":"https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=800&q=75",
  "Wellness & Mindfulness":"https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=800&q=75",
  "Personal Growth":"https://images.unsplash.com/photo-1499728603263-13726abce5fd?w=800&q=75",
  "Relationships & Giving":"https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=800&q=75",
  "Local Adventures":"https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=800&q=75",
};
async function fetchPhoto(item){
  try{
    const r=await fetch(`https://api.unsplash.com/photos/random?query=${encodeURIComponent(item.title+" "+item.location)}&orientation=landscape&content_filter=high&client_id=${UKEY}`);
    if(!r.ok) throw 0;
    const d=await r.json();
    return d?.urls?.regular||null;
  }catch{return null;}
}
async function bakePhotos(list){
  const res=await Promise.allSettled(list.map(fetchPhoto));
  return list.map((item,i)=>({...item,photoUrl:(res[i].status==="fulfilled"&&res[i].value)?res[i].value:FALLBACKS[item.category]||FALLBACKS["Travel & Culture"]}));
}

/* ── UTILS ───────────────────────────────────────────────────────── */
const uid=()=>Math.random().toString(36).slice(2,10);
const parseCount=s=>{const m=s?.match(/\d+/);return m?parseInt(m[0]):25;};
const fmtDate=ts=>ts?new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):null;
const LS={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

/* ── SHAREABLE URL ───────────────────────────────────────────────── */
function encodeList(items,ans){
  try{
    const payload={items:items.map(i=>({id:i.id,title:i.title,location:i.location,category:i.category,difficulty:i.difficulty,description:i.description})),name:ans.name||""};
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }catch{return null;}
}
function decodeList(hash){
  try{return JSON.parse(decodeURIComponent(escape(atob(hash))));}catch{return null;}
}
function buildShareUrl(items,ans){
  const encoded=encodeList(items,ans);
  if(!encoded) return null;
  return `${window.location.origin}/app?list=${encoded}`;
}

/* ── QUIZ DATA ────────────────────────────────────────────────────── */
const MODES=[
  {id:"personal",icon:"✦",label:"Just Me",      sub:"A deeply personal life list"},
  {id:"couple",  icon:"♡",label:"For Us",        sub:"A shared list for two"},
  {id:"family",  icon:"⌂",label:"Family",        sub:"Adventures for everyone"},
  {id:"surprise",icon:"✧",label:"Surprise Me",   sub:"Let the AI decide everything"},
];
const LIFE_STAGES=[
  {id:"teen",      label:"Under 20",  icon:"🌱"},
  {id:"twenties",  label:"20s",       icon:"⚡"},
  {id:"thirties",  label:"30s",       icon:"🔥"},
  {id:"forties",   label:"40s",       icon:"🌊"},
  {id:"fifties",   label:"50s",       icon:"🌿"},
  {id:"sixties",   label:"60s",       icon:"☀️"},
  {id:"retirement",label:"Retirement",icon:"✦"},
];
const STEPS=[
  {id:"name",      type:"text",            eyebrow:"Welcome",      question:"Let's start. What's your name?",                              subtitle:"This list will be built for you, and only you.",               placeholder:"Your name..."},
  {id:"location",  type:"text",            eyebrow:"Step 1 of 8",  question:"Where in the world do you call home?",                             subtitle:"We'll find extraordinary adventures on your doorstep too.",    placeholder:"e.g. London, UK or Dubai, UAE"},
  {id:"stage",     type:"single_icon",     eyebrow:"Step 2 of 8",  question:"What chapter of life are you in right now?",                       subtitle:"Each season of life deserves its own kind of extraordinary.",  options:LIFE_STAGES},
  {id:"regret",    type:"text_big_values", eyebrow:"Step 3 of 8",  question:"You're 90, looking back. What do you hope you spent your time on?",  subtitle:"Be specific — not 'family and adventure' but what exactly. The more detail, the better your list.", placeholder:"e.g. I want to have taken my kids to see the places I grew up hearing about. Built something that outlasted me. Learned Italian properly. Said the things I kept almost saying. Watched sunrise from somewhere that earned it..."},
  {id:"future",    type:"text_big",        eyebrow:"Step 4 of 8",  question:"It's 10 years from now and everything went right. Describe a specific Tuesday morning.", subtitle:"Sensory details, not goals — what do you see, hear, smell? Who is there? What's on the calendar that week?", placeholder:"e.g. I wake up in the house we finally bought outside the city. Kids are older. Working on something I actually chose. Morning run, then work I care about, dinner we cooked. Been to Japan twice by then. There's a dog..."},
  {id:"fear",      type:"text_big",        eyebrow:"Step 5 of 8",  question:"What’s been on every mental version of your bucket list — but never actually gets booked?", subtitle:"The thing you keep almost doing. The AI will make sure this one finally makes it.",              placeholder:"e.g. Three weeks in Japan. Write the novel I’ve been outlining for four years. Take my mum back to where she grew up. Learn to freedive. Actually run a marathon — not just sign up for one..."},
  {id:"categories",type:"multiselect",     eyebrow:"Step 6 of 8",  question:"What kinds of experiences light you up?",                          subtitle:"Choose everything that makes your heart beat faster.",         options:CAT_KEYS},
  {id:"difficulty",type:"multiselect",     eyebrow:"Step 7 of 8",  question:"What does your life have room for right now?",                     subtitle:"Be honest — the best list meets you where you are.",          options:["Something this weekend","A goal for this year","A big challenge to work toward","A dream for one day"]},
  {id:"count",     type:"single",          eyebrow:"Step 8 of 8",  question:"How long should your one wild and precious life list be?",         subtitle:"There are no wrong answers here.",                             options:["10 — focused and intentional","25 — a life well lived","50 — go bigger than you planned","100 — the full, unedited version"]},
];
const GMSGS=["Reading everything you shared...","Identifying the patterns in what you told us...","Synthesising your values, vision, and what you keep postponing...","Building experiences around the life you described...","Grounding your list in where you actually live...","Writing your personal summary now...","Ensuring every item earns its place...","One last pass — making sure this list could only ever be yours..."];

/* ── SHARED ATOMS ────────────────────────────────────────────────── */
function Logo(){
  return(
    <div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"center"}}>
      <div style={{height:1,width:40,background:`linear-gradient(to right,transparent,${G})`}}/>
      <a href="/" style={{color:G,fontSize:11,letterSpacing:"0.26em",textTransform:"uppercase",fontFamily:SANS,fontWeight:700,textDecoration:"none"}}>The Bucket List AI</a>
      <div style={{height:1,width:40,background:`linear-gradient(to left,transparent,${G})`}}/>
    </div>
  );
}
function Rule({mb=0,mt=0,op=1}){
  return <div style={{height:1,background:`linear-gradient(to right,transparent,${G},transparent)`,marginBottom:mb,marginTop:mt,opacity:op}}/>;
}

/* ── CARD PHOTO ──────────────────────────────────────────────────── */
function CardPhoto({item,isDone}){
  const accent=CAT_COLOR[item.category]||G;
  const [loaded,setLoaded]=useState(false);
  const src=item.photoUrl||FALLBACKS[item.category]||FALLBACKS["Travel & Culture"];
  const diffColor=DIFF_COLOR[item.difficulty]||G;
  return(
    <div style={{position:"relative",height:190,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:CARD,display:loaded?"none":"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:24,height:24,border:`2px solid ${GD}`,borderTopColor:G,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      </div>
      <img src={src} alt={item.title} onLoad={()=>setLoaded(true)}
        style={{width:"100%",height:"100%",objectFit:"cover",opacity:isDone?.45:loaded?1:0,transition:"opacity .5s ease",filter:isDone?"grayscale(60%)":"none"}}/>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(7,30,30,0) 30%,rgba(7,30,30,.85) 100%)"}}/>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:accent}}/>
      <div style={{position:"absolute",bottom:12,left:14,right:14,display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:8}}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".18em",textTransform:"uppercase",color:accent,fontFamily:SANS,background:"rgba(7,30,30,.75)",padding:"3px 8px",borderRadius:100}}>
          {item.category}
        </span>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:diffColor,fontFamily:SANS,background:"rgba(7,30,30,.75)",padding:"3px 8px",borderRadius:100}}>
          {item.difficulty}
        </span>
      </div>
    </div>
  );
}

/* ── NEXT STEPS ──────────────────────────────────────────────────── */
function NextSteps({steps}){
  const [open,setOpen]=useState(false);
  if(!steps?.length) return null;
  return(
    <div style={{marginBottom:10}}>
      <button onClick={()=>setOpen(o=>!o)} className="act-btn"
        style={{background:"transparent",border:`1px solid ${open?"rgba(201,168,76,.4)":RULE}`,color:open?G:MIST,padding:"6px 12px",fontSize:11,fontFamily:SANS,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .2s"}}>
        <span>Next Steps</span>
        <span style={{fontSize:10,opacity:.7}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:5,animation:"noteIn .2s ease"}}>
          {steps.map((s,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:`rgba(201,168,76,.15)`,border:`1px solid ${GD}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:G,fontFamily:SANS,fontWeight:700,flexShrink:0,marginTop:1}}>{i+1}</div>
              <p style={{fontSize:12,color:MIST,lineHeight:1.65,fontFamily:SANS}}>{s}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── ADD DREAM MODAL ─────────────────────────────────────────────── */
function AddDreamModal({onAdd,onClose}){
  const [title,setTitle]=useState("");
  const [location,setLocation]=useState("");
  const [category,setCategory]=useState(CAT_KEYS[0]);
  const [desc,setDesc]=useState("");
  const [saving,setSaving]=useState(false);
  async function submit(){
    if(!title.trim()||!location.trim()) return;
    setSaving(true);
    const item={id:uid(),title:title.trim(),location:location.trim(),category,description:desc.trim()||"A dream chosen by you.",difficulty:"Epic Goal",nextSteps:[],custom:true};
    const photoUrl=await fetchPhoto(item)||FALLBACKS[category]||FALLBACKS["Travel & Culture"];
    onAdd({...item,photoUrl});
    setSaving(false);
    onClose();
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
      <div style={{background:CARD2,border:`1px solid rgba(201,168,76,.3)`,maxWidth:520,width:"100%",padding:36,maxHeight:"90vh",overflowY:"auto",borderRadius:2}} onClick={e=>e.stopPropagation()}>
        <h2 style={{fontFamily:SERIF,fontSize:28,fontWeight:400,color:IVY,marginBottom:6}}>Add Your Own Dream</h2>
        <p style={{fontSize:14,color:MIST,fontFamily:SANS,marginBottom:24}}>Something the AI didn't think of — make it yours.</p>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {[["Dream *",title,setTitle,"e.g. Watch the sunrise over Angkor Wat"],["Location *",location,setLocation,"e.g. Siem Reap, Cambodia"]].map(([lbl,val,set,ph])=>(
            <div key={lbl}>
              <label style={{fontSize:10,color:G,letterSpacing:".18em",textTransform:"uppercase",fontFamily:SANS,fontWeight:700,display:"block",marginBottom:6}}>{lbl}</label>
              <input value={val} onChange={e=>set(e.target.value)} placeholder={ph}
                style={{width:"100%",background:"rgba(255,255,255,.05)",border:`1px solid ${RULE}`,padding:"12px 16px",fontSize:15,color:IVY,fontFamily:SANS,borderRadius:2}}/>
            </div>
          ))}
          <div>
            <label style={{fontSize:10,color:G,letterSpacing:".18em",textTransform:"uppercase",fontFamily:SANS,fontWeight:700,display:"block",marginBottom:6}}>Category</label>
            <select value={category} onChange={e=>setCategory(e.target.value)}
              style={{width:"100%",background:CARD,border:`1px solid ${RULE}`,padding:"12px 16px",fontSize:14,color:IVY,fontFamily:SANS,cursor:"pointer",borderRadius:2}}>
              {CAT_KEYS.map(k=><option key={k} value={k}>{k}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:10,color:G,letterSpacing:".18em",textTransform:"uppercase",fontFamily:SANS,fontWeight:700,display:"block",marginBottom:6}}>Why does this matter? <span style={{color:MIST,fontWeight:400,textTransform:"none",letterSpacing:0}}>(optional)</span></label>

            <button onClick={submit} disabled={loading} className="btn-gold"

function App(){
  const [screen,   setScreen]   = useState("hero");
  const [mode,     setMode]     = useState(null);
  const [step,     setStep]     = useState(0);
  const [ans,      setAns]      = useState({});
  const [txt,      setTxt]      = useState("");
  const [items,    setItems]    = useState([]);
  const [meta,     setMeta]     = useState({});
  const [synthesis,setSynthesis]= useState("");
  const [gmsg,     setGmsg]     = useState(GMSGS[0]);
  const [filter,   setFilter]   = useState("All");
  const [sortBy,   setSortBy]   = useState("default");
  const [search,   setSearch]   = useState("");
  const [celeb,    setCeleb]    = useState(null);
  const [confetti, setConfetti] = useState([]);
  const [noteDraft,setNoteDraft]= useState({});
  const [showAdd,  setShowAdd]  = useState(false);
  const [showEmail,setShowEmail]= useState(false);
  const [showShare,setShowShare]= useState(false);
  const [showPDF,  setShowPDF]  = useState(false);
  const [milestone,setMilestone]= useState(null);
  const [isShared, setIsShared] = useState(false);
  const [error,    setError]    = useState(null);
  const inputRef=useRef(null);

  // Load saved state or shared list
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    // Load shared list from URL
    const listParam=params.get("list");
    if(listParam){
      const decoded=decodeList(listParam);
      if(decoded?.items?.length){
        const withPhotos=decoded.items.map(i=>({...i,photoUrl:FALLBACKS[i.category]||FALLBACKS["Travel & Culture"]}));
        setItems(withPhotos);
        setAns({name:decoded.name||""});
        setMode("personal");
        setIsShared(true);
        setScreen("list");
        return;
      }
    }
    // Load from localStorage
    const d=LS.get("bl-v9");
    if(d?.items){setItems(d.items);setAns(d.ans||{});setMeta(d.meta||{});setMode(d.mode||"personal");setScreen("list");return;}
    // Stripe payment success — auto-open premium PDF modal
    const premiumSuccess=params.get("premium");
    if(premiumSuccess==="1"){
      // Try to restore list from sessionStorage if current list is empty
      try{
        const pending=sessionStorage.getItem("bl-premium-pending");
        if(pending){
          const {items:savedItems,ans:savedAns}=JSON.parse(pending);
          if(savedItems?.length){
            setItems(savedItems);
            setAns(savedAns||{});
            setScreen("list");
            setTimeout(()=>setShowPDF(true),800);
            sessionStorage.removeItem("bl-premium-pending");
            return;
          }
        }
      }catch(e){}
      // If list already in state, just open PDF modal to premium tab
      setTimeout(()=>setShowPDF(true),800);
      return;
    }
    // Load mode from URL
    const urlMode=params.get("mode");
    if(urlMode&&["personal","couple","family","surprise"].includes(urlMode))
      setTimeout(()=>selectMode(urlMode),100);
  },[]);

  useEffect(()=>{if(items.length>0) LS.set("bl-v9",{items,ans,meta,mode});},[items,meta,ans,mode]);

  useEffect(()=>{
    if(screen==="quiz"&&(STEPS[step]?.type==="text"||STEPS[step]?.type==="text_big"||STEPS[step]?.type==="text_big_values"))
      setTimeout(()=>inputRef.current?.focus(),130);
  },[screen,step]);

  /* ── GENERATE ────────────────────────────────────────────────── */
  async function generate(overrideAns){
    setScreen("generating");setError(null);
    let i=0;const iv=setInterval(()=>{i=(i+1)%GMSGS.length;setGmsg(GMSGS[i]);},2400);
    const a=overrideAns||ans;
    const count=parseCount(a.count)||25;

      function repairJSON(s){
        // Remove trailing comma before attempting close
        s=s.replace(/,\s*$/,"");
        // Count open braces/brackets
        let opens=0,openb=0;
        for(const ch of s){if(ch==="{")opens++;else if(ch==="}")opens--;else if(ch==="[")openb++;else if(ch==="]")openb--;}
        // Close any unclosed objects then array
        while(opens>0){s+="}";opens--;}
        while(openb>0){s+="]";openb--;}
        return s;

                      <button key={v.label} onClick={()=>selectTile(v)} className="opt-btn"
                        style={{background:sel?"rgba(201,168,76,.12)":"rgba(255,255,255,.03)",border:`1px solid ${sel?G:RULE}`,padding:"12px 14px",cursor:"pointer",textAlign:"left",transition:"all .2s",borderRadius:2}}>
                        <div style={{fontSize:16,color:sel?G:"rgba(245,237,216,.5)",marginBottom:4}}>{v.icon}</div>
                        <div style={{fontSize:13,fontFamily:BASK,color:sel?G:IVY,fontWeight:sel?700:400,marginBottom:2}}>{v.label}</div>
                        <div style={{fontSize:10,color:MIST,fontFamily:SANS,lineHeight:1.4,fontWeight:300}}>{v.desc}</div>
                      </button>
                    );

                </div>
                {/* Divider */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{flex:1,height:1,background:RULE}}/>

                </div>
                {/* Free text */}
                <textarea ref={inputRef} value={txt.startsWith(VALUE_TILES.find(v=>txt.startsWith(v.label))?.label||"__none__")?""  :txt}
                  onChange={e=>setTxt(e.target.value)}
                  placeholder={s.placeholder} rows={3}
                  style={{width:"100%",background:"rgba(255,255,255,.05)",border:`1px solid ${RULE}`,padding:"14px 18px",fontSize:15,color:IVY,fontFamily:SANS,lineHeight:1.7,resize:"vertical",marginBottom:12,borderRadius:2}}/>
                <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
                  <button onClick={()=>{setTxt(" ");nextStep();}} className="btn-ghost"
                    style={{background:"transparent",border:`1px solid ${RULE}`,color:MIST,padding:"12px 20px",fontSize:13,cursor:"pointer",fontFamily:SANS,borderRadius:2}}>
                    Skip
                  </button>
                  <button onClick={nextStep} className="btn-gold" disabled={!txt.trim()}
                    style={{background:txt.trim()?G:"rgba(201,168,76,.3)",border:"none",color:INK,padding:"12px 28px",fontSize:13,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",cursor:txt.trim()?"pointer":"default",fontFamily:SANS,borderRadius:2,transition:"all .2s"}}>
                    Continue →
                  </button>
                </div>
              </div>
            );
          })()}

          {/* SINGLE ICON (life stage) */}
          {s.type==="single_icon"&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:10,marginBottom:20}}>
              {s.options.map(opt=>{
                const sel=ans[s.id]===opt.label;
                return(
                  <button key={opt.id} onClick={()=>selectSingleIcon(opt)} className="opt-btn"
                    style={{background:sel?"rgba(201,168,76,.12)":"rgba(255,255,255,.03)",border:`1px solid ${sel?G:RULE}`,padding:"16px 10px",cursor:"pointer",textAlign:"center",transition:"all .2s",borderRadius:2}}>
                    <div style={{fontSize:22,marginBottom:6}}>{opt.icon}</div>
                    <div style={{fontSize:12,fontFamily:BASK,color:sel?G:IVY,fontWeight:sel?700:400}}>{opt.label}</div>
                  </button>
                );
              })}
            </div>
          )}

          {/* SINGLE (count) */}
          {s.type==="single"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {s.options.map(opt=>{
                const sel=ans[s.id]===opt;
                return(
                  <button key={opt} onClick={()=>selectSingle(opt)} className="opt-btn"
                    style={{background:sel?"rgba(201,168,76,.1)":"rgba(255,255,255,.03)",border:`1px solid ${sel?G:RULE}`,padding:"16px 20px",cursor:"pointer",textAlign:"left",fontSize:15,color:sel?G:IVY,fontFamily:BASK,fontWeight:sel?700:400,letterSpacing:"-.2px",transition:"all .2s",borderRadius:2}}>
                    {opt}
                  </button>
                );

            </div>
          )}

          {/* MULTISELECT (categories, difficulty) */}
          {s.type==="multiselect"&&(
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:16}}>

                  return(
                    <button key={opt} onClick={()=>toggleMulti(opt)} className="opt-btn"

                {multiSel.length>0&&(

                    style={{background:G,border:"none",color:INK,padding:"12px 28px",fontSize:13,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,borderRadius:2}}>

                  </button>
                )}
              </div>
            </>
          )}

          {error&&<p style={{color:"#F87171",fontSize:13,fontFamily:SANS,textAlign:"center",marginTop:12}}>{error}</p>}

          {/* Step dots */}
          <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:28}}>

        </div>
      </div>

  /* ── GENERATING ───────────────────────────────────────────────── */
  if(screen==="generating") return(

        {ans.fear && (
          <p style={{fontSize:12,color:"rgba(201,168,76,.45)",fontFamily:SANS,fontWeight:300,marginTop:16,fontStyle:"italic",lineHeight:1.6,maxWidth:380,margin:"16px auto 0"}}>

  /* ── LIST ─────────────────────────────────────────────────────── */

  return(

          <div style={{fontFamily:SERIF,fontSize:22,color:IVY,letterSpacing:"-.3px",marginBottom:4}}>{milestone.msg}</div>
          <div style={{fontSize:13,color:MIST,fontFamily:SANS,fontWeight:300}}>{milestone.sub}</div>

      {/* ── 90-DAY QUEST CTA ── */}

            <div style={{fontSize:10,color:G,fontFamily:SANS,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",marginBottom:16}}>What happens next</div>

                  style={{background:G,border:"none",color:INK,padding:"14px 24px",fontSize:11,fontWeight:700,letterSpacing:".16em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,whiteSpace:"nowrap"}}
                >
                  Start My Quest ✦
                </button>
              </div>
            ) : (
              <div style={{display:"inline-flex",alignItems:"center",gap:10,background:"rgba(110,231,183,.1)",border:"1px solid rgba(110,231,183,.3)",padding:"14px 24px"}}>
                <span style={{fontSize:16,color:"#6EE7B7"}}>✦</span>
                <span style={{fontSize:13,color:"#6EE7B7",fontFamily:SANS,fontWeight:500}}>You're on the quest. First mission arrives Monday.</span>

            <p style={{fontSize:11,color:"rgba(245,237,216,.25)",fontFamily:SANS,marginTop:16,letterSpacing:".06em"}}>No spam. Unsubscribe anytime. One email per week.</p>
          </div>

      {/* ── SHARED LIST CTA BAR ── */}
      {isShared&&(
        <div style={{background:`linear-gradient(90deg,${TEAL},#0D4545)`,borderBottom:`1px solid ${G}`,padding:"14px 24px",position:"sticky",top:0,zIndex:300,backdropFilter:"blur(18px)"}}>
          <div style={{maxWidth:1260,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
            <div>
              <p style={{fontSize:13,color:IVY,fontFamily:SANS,fontWeight:500,marginBottom:2}}>
                {userName?`You're viewing ${userName}'s bucket list`:"You're viewing a shared bucket list"}
                <span style={{color:G}}> ✦</span>
              </p>
              <p style={{fontSize:11,color:MIST,fontFamily:SANS,fontWeight:300}}>
                {items.length} experiences · built by AI around their life

            <a href="/app" style={{display:"inline-flex",alignItems:"center",gap:8,background:G,color:INK,padding:"11px 28px",fontSize:11,fontWeight:700,letterSpacing:".16em",textTransform:"uppercase",fontFamily:SANS,textDecoration:"none",borderRadius:100,flexShrink:0,transition:"all .25s"}}
              onMouseOver={e=>e.currentTarget.style.background=GL}
              onMouseOut={e=>e.currentTarget.style.background=G}>
              Build My Own List ✦
            </a>
          </div>
        </div>
      )}

        <div style={{maxWidth:1260,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
          <Logo/>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setShowAdd(true)} className="btn-ghost"
              style={{background:"transparent",border:`1px solid ${RULE}`,color:MIST,padding:"9px 16px",fontSize:11,fontFamily:SANS,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer",display:"flex",alignItems:"center",gap:6,borderRadius:100}}>
              + Add Dream
            </button>
            <button onClick={()=>setShowShare(true)} className="btn-ghost"
              style={{background:"transparent",border:`1px solid rgba(201,168,76,.4)`,color:G,padding:"9px 16px",fontSize:11,fontFamily:SANS,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer",borderRadius:100,display:"flex",alignItems:"center",gap:5}}>

              style={{background:"transparent",border:`1px solid ${RULE}`,color:MIST,padding:"9px 16px",fontSize:11,fontFamily:SANS,fontWeight:500,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",borderRadius:100}}>

                {items.length} experiences · {doneCount} completed · {starCount} starred

            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:SERIF,fontSize:32,color:G,lineHeight:1}}>{pct}%</div>

          </div>
        </div>
      </div>


      {/* ── AI SYNTHESIS CARD ── */}
      {!isShared && (synthesis || (ans.name && (ans.regret||ans.future||ans.fear))) && (
        <div style={{maxWidth:1260,margin:"0 auto",padding:"24px 24px 0"}}>
          <div style={{background:`linear-gradient(135deg,rgba(13,42,42,.95),rgba(11,61,61,.7))`,border:`1px solid rgba(201,168,76,.28)`,borderLeft:`3px solid ${G}`,padding:"24px 28px",animation:"riseIn .7s cubic-bezier(.22,1,.36,1) both"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:16}}>
              <div style={{flexShrink:0,marginTop:3}}>
                <div style={{width:32,height:32,border:`1px solid ${G}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:G}}>✦</div>

                  <p style={{fontFamily:SANS,fontSize:11,color:MIST,fontWeight:300,margin:0}}>

                  </p>

          </div>

      {/* ── CONTROLS ── */}
      <div className="controls-wrap" style={{background:`rgba(7,30,30,.97)`,borderBottom:`1px solid ${RULE}`,padding:"12px 24px",position:"sticky",top:isShared?113:61,zIndex:190,backdropFilter:"blur(14px)"}}>
        <div style={{maxWidth:1260,margin:"0 auto",display:"flex",flexDirection:"column",gap:10}}>
          {/* Search + sort */}
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{position:"relative",flex:1,minWidth:200}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:GD,pointerEvents:"none"}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search your list..."
                style={{width:"100%",background:"rgba(255,255,255,.04)",border:`1px solid ${RULE}`,padding:"9px 14px 9px 34px",fontSize:13,color:IVY,fontFamily:SANS,borderRadius:100}}/>
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              <span style={{fontSize:9,color:GD,letterSpacing:".14em",textTransform:"uppercase",fontFamily:SANS,fontWeight:600}}>Sort:</span>
              {[["default","Default"],["starred","★ Starred"],["undone","Undone"],["difficulty","Difficulty"],["category","Category"]].map(([val,lbl])=>(
                <button key={val} onClick={()=>setSortBy(val)} className="pill-filter"
                  style={{background:sortBy===val?"rgba(201,168,76,.1)":"transparent",border:`1px solid ${sortBy===val?G:RULE}`,color:sortBy===val?G:MIST,padding:"5px 12px",fontSize:10,fontFamily:SANS,fontWeight:sortBy===val?700:500,cursor:"pointer",letterSpacing:".08em",borderRadius:100,whiteSpace:"nowrap",transition:"all .2s"}}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>
          {/* Category filters */}
          <div className="filter-scroll" style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {["All",...CAT_KEYS,"This Weekend","This Year","Epic Goal","Lifetime Dream"].map(f=>{
              const sel=filter===f;
              const color=CAT_COLOR[f]||DIFF_COLOR[f]||G;
              return(
                <button key={f} onClick={()=>setFilter(f)} className="pill-filter"
                  style={{background:sel?`rgba(${hexToRgb(color)},.12)`:"transparent",border:`1px solid ${sel?color:RULE}`,color:sel?color:MIST,padding:"5px 12px",fontSize:10,fontFamily:SANS,fontWeight:sel?700:500,cursor:"pointer",letterSpacing:".08em",borderRadius:100,whiteSpace:"nowrap",transition:"all .2s"}}>
                  {f}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* ── GRID ── */}
      <div style={{maxWidth:1260,margin:"0 auto",padding:"28px 16px 60px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:16}}>
        {displayed.length===0&&search&&(
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px"}}>
            <p style={{fontSize:18,color:MIST,fontFamily:SANS}}>No results for "{search}"</p>
          </div>
        )}
        {displayed.map((item,idx)=>{
          const m=gm(item.id),isDone=!!m.done,isStar=!!m.starred,hasNote=!!m.note,noteOpen=!!m.noteOpen,isCeleb=celeb===item.id;
          const accent=CAT_COLOR[item.category]||G;
          return(
            <div key={item.id} className="card-item"
              style={{background:CARD,border:`1px solid ${isCeleb?G:isStar?"rgba(201,168,76,.45)":RULE}`,overflow:"hidden",animation:`riseIn .5s cubic-bezier(.22,1,.36,1) ${(idx%12)*.04}s both`,opacity:isDone?.55:1,boxShadow:isStar?`0 4px 28px rgba(201,168,76,.12)`:"0 2px 16px rgba(0,0,0,.3)",position:"relative",borderRadius:2,...(isCeleb?{animation:"goldGlow 1s ease,celebrate .6s ease"}:{})}}>

              {/* Starred corner */}
              {isStar&&<div style={{position:"absolute",top:0,right:0,width:0,height:0,borderLeft:"28px solid transparent",borderTop:`28px solid ${G}`,zIndex:10}}/>}

              <CardPhoto item={item} isDone={isDone}/>

              <div style={{padding:"14px 16px 16px"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:6}}>
                  <h3 style={{fontFamily:BASK,fontSize:15,fontWeight:700,color:isDone?"rgba(245,237,216,.35)":IVY,lineHeight:1.3,textDecoration:isDone?"line-through":"none",flex:1}}>
                    {item.title}
                  </h3>
                </div>
                <p style={{fontSize:12,color:MIST,fontFamily:SANS,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{opacity:.6}}>📍</span>{item.location}
                </p>
                <p style={{fontSize:13,color:"rgba(245,237,216,.6)",fontFamily:SANS,lineHeight:1.72,marginBottom:item.why?8:10}}>
                  {item.description}
                </p>

                {/* Why this — personalized reason */}
                {item.why&&(
                  <div style={{background:`rgba(201,168,76,.06)`,borderLeft:`2px solid ${G}`,padding:"7px 11px",marginBottom:10,borderRadius:"0 2px 2px 0"}}>
                    <p style={{fontSize:11,color:G,fontFamily:SANS,lineHeight:1.65,fontWeight:500,letterSpacing:".01em"}}>{item.why}</p>
                  </div>
                )}

                <NextSteps steps={item.nextSteps}/>

                {isDone&&m.doneDate&&(
                  <div style={{marginBottom:8}}>
                    <span style={{fontSize:11,color:G,fontFamily:SANS,fontWeight:600}}>✓ Completed {fmtDate(m.doneDate)}</span>
                  </div>
                )}

                {hasNote&&!noteOpen&&(
                  <div style={{background:"rgba(201,168,76,.07)",borderLeft:`2px solid ${G}`,padding:"7px 11px",marginBottom:9,animation:"noteIn .25s ease",borderRadius:"0 2px 2px 0"}}>
                    <p style={{fontSize:12,color:IVY,fontFamily:SANS,lineHeight:1.65,fontStyle:"italic"}}>{m.note}</p>
                  </div>
                )}

                {noteOpen&&(
                  <div style={{marginBottom:9,animation:"noteIn .2s ease"}}>
                    <textarea value={noteDraft[item.id]||""} onChange={e=>setNoteDraft(p=>({...p,[item.id]:e.target.value}))}
                      placeholder="Add a note, plan, memory, or wish..." rows={3}
                      style={{width:"100%",background:"rgba(255,255,255,.04)",border:`1px solid ${RULE}`,padding:"9px 12px",fontSize:13,color:IVY,fontFamily:SANS,lineHeight:1.65,resize:"vertical",borderRadius:2}}/>
                    <div style={{display:"flex",gap:7,marginTop:6}}>
                      <button onClick={()=>saveNote(item.id)} className="btn-gold"
                        style={{flex:1,background:G,border:"none",color:INK,padding:"8px 14px",fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,borderRadius:2}}>Save</button>
                      <button onClick={()=>closeNote(item.id)} className="btn-ghost"
                        style={{background:"transparent",border:`1px solid ${RULE}`,color:MIST,padding:"8px 12px",fontSize:11,cursor:"pointer",fontFamily:SANS,borderRadius:2}}>Cancel</button>
                    </div>
                  </div>
                )}

                <Rule mb={10} op={.15}/>

                {/* Action buttons */}
                <div style={{display:"flex",gap:6,marginBottom:7}}>
                  <button className="act-btn" onClick={()=>toggleStar(item.id)}
                    style={{flex:1,background:isStar?"rgba(201,168,76,.1)":"rgba(255,255,255,.03)",border:`1px solid ${isStar?G:RULE}`,color:isStar?G:MIST,padding:"7px 8px",fontSize:11,cursor:"pointer",fontFamily:SANS,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:4,transition:"all .2s",borderRadius:2}}>
                    <span>{isStar?"★":"☆"}</span><span>{isStar?"Starred":"Star"}</span>
                  </button>
                  <button className="act-btn" onClick={()=>noteOpen?closeNote(item.id):openNote(item.id)}
                    style={{flex:1,background:hasNote?"rgba(201,168,76,.07)":"rgba(255,255,255,.03)",border:`1px solid ${hasNote?"rgba(201,168,76,.35)":RULE}`,color:hasNote?G:MIST,padding:"7px 8px",fontSize:11,cursor:"pointer",fontFamily:SANS,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:4,transition:"all .2s",borderRadius:2}}>
                    <span>📝</span><span>{hasNote?"Edit":"Note"}</span>
                  </button>
                  {item.custom&&(
                    <button className="act-btn" onClick={()=>removeItem(item.id)}
                      style={{background:"rgba(255,255,255,.02)",border:`1px solid ${RULE}`,color:"rgba(245,237,216,.25)",padding:"7px 10px",fontSize:11,cursor:"pointer",fontFamily:SANS,fontWeight:600,transition:"all .2s",borderRadius:2}}
                      title="Remove">✕</button>
                  )}
                </div>

                {/* Mark complete */}
                <button className="done-btn" onClick={()=>toggleDone(item.id)}
                  style={{width:"100%",background:isDone?"rgba(201,168,76,.1)":"transparent",border:`2px solid ${isDone?G:"rgba(201,168,76,.3)"}`,color:isDone?G:IVY,padding:"9px 14px",fontSize:11,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .25s",marginBottom:7,borderRadius:2}}>
                  {isDone?<><span>✓</span><span>Done{m.doneDate?" · "+fmtDate(m.doneDate):""}</span></>:<><span>○</span><span>Mark as Complete</span></>}
                </button>

                {/* Smart affiliate button */}
                <a href={getAffiliateUrl(item)} target="_blank" rel="noopener noreferrer"
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,width:"100%",background:"linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.06))",border:`1px solid rgba(201,168,76,.35)`,color:G,padding:"10px 14px",fontSize:11,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,fontWeight:700,textDecoration:"none",transition:"all .22s",borderRadius:2}}>
                  {getAffiliateCTA(item)}
                </a>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── FOOTER ── */}
      <div style={{maxWidth:1260,margin:"0 auto",padding:"0 20px 60px",display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
        <Rule op={.3}/>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center",marginTop:8}}>
          <a href="/ideas" rel="noopener noreferrer"
            style={{background:"transparent",border:`2px solid rgba(201,168,76,.3)`,color:G,padding:"12px 32px",fontSize:11,letterSpacing:".14em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,fontWeight:700,textDecoration:"none",display:"inline-block",transition:"all .25s",borderRadius:100}}
            onMouseOver={e=>{e.currentTarget.style.background="rgba(201,168,76,.08)";e.currentTarget.style.borderColor=G}}
            onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="rgba(201,168,76,.3)"}}>
            ✦ Browse 1,000 Experiences
          </a>
          <button onClick={()=>setShowShare(true)}
            style={{background:G,border:"none",color:INK,padding:"12px 28px",fontSize:11,letterSpacing:".14em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,fontWeight:700,transition:"all .22s",borderRadius:100}}
            onMouseOver={e=>e.currentTarget.style.background=GL}
            onMouseOut={e=>e.currentTarget.style.background=G}>
            ✦ Share My List
          </button>
          <button onClick={()=>setShowEmail(true)}
            style={{background:"rgba(201,168,76,.08)",border:`2px solid rgba(201,168,76,.22)`,color:G,padding:"12px 24px",fontSize:11,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer",fontFamily:SANS,fontWeight:700,transition:"all .22s",borderRadius:100}}>
            ✉ Save My List
          </button>
        </div>
        <button onClick={reset} style={{background:"none",border:"none",color:MIST,fontSize:11,letterSpacing:".12em",cursor:"pointer",fontFamily:SANS,textTransform:"uppercase",fontWeight:500}}>
          ↺ Start Over
        </button>
        <div style={{display:"flex",alignItems:"center",gap:14,marginTop:4}}>
          <div style={{height:1,width:36,background:`linear-gradient(to right,transparent,${G})`}}/>
          <span style={{color:G,fontSize:13}}>✦</span>
          <div style={{height:1,width:36,background:`linear-gradient(to left,transparent,${G})`}}/>
        </div>
        <p style={{fontSize:10,color:GD,letterSpacing:".18em",textTransform:"uppercase",fontFamily:SANS,fontWeight:600}}>© 2026 The Bucket List AI · Your Dreams. One Lifetime.</p>
      </div>
    </div>
  );
}

/* ── HELPER: hex to rgb for rgba() ──────────────────────────────── */
function hexToRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:"201,168,76";
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
